name: Build and Deploy Sharepoint Documentation to GitHub Pages

on:
  push:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          sudo apt-get install -y doxygen graphviz
          pip install --upgrade pip
          pip install -r requirements.txt

      # Optional: DBC → JSON for the React app only. Failure does not block docs or deploy.
      - name: Export CAN spec JSON
        id: canspec_export
        continue-on-error: true
        run: python3 can/canspec-ui/export_canspec_json.py

      - name: Build MkDocs site
        run: mkdocs build

      # Optional: only needed to bundle the CAN spec UI into site/CAN-Spec/.
      - name: Set up Node
        id: setup_node
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: can/canspec-ui/package-lock.json

      # Optional: if npm/Vite fails, site/CAN-Spec/ stays the MkDocs stub from docs/CAN-Spec/.
      - name: Build CAN spec UI (Vite)
        id: canspec_ui
        continue-on-error: true
        working-directory: can/canspec-ui
        run: |
          npm ci
          npm run build
          rm -rf ../../site/CAN-Spec
          cp -r dist ../../site/CAN-Spec

      # Only run when pushing to main
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: true