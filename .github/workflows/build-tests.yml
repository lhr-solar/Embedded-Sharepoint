name: Build Tests

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Cache Nix
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/nix
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Install Nix Action
        uses: cachix/install-nix-action@v31

      - name: Clean & Build tests
        run: |
          echo "Checking for code changes..."
          # Use the full push diff before entering nix develop
          echo "${{ github.event.before }}"
          echo "${{ github.sha }}"
          CHANGES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -vE "^(docs/|dbc/)")
          if [ -n "$CHANGES" ]; then
              echo "Code changes detected:"
              echo "$CHANGES"
              nix develop --accept-flake-config --command bash -c '
                  cd test
                  make clean
                  python3 makeAllTests.py
              '
          else
              echo "No code changes"
          fi
