name: Build Tests

on:
  pull_request:
  push:
    paths-ignore:
      - "**/*.md"
      - "**/*.dbc"
      - "**/*.py"

jobs:
  # Matrix job to run all port+test combinations in parallel
  build-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # STM32F4 Family
          - port: stm32f401re
          - port: stm32f413rht
          - port: stm32f446ret
          - port: stm32f429zit
          # STM32G4 Family
          - port: stm32g473xx
          - port: stm32g474xx
          # STM32L4 Family
          - port: stm32l431cbt
          - port: stm32l432kcu
          - port: stm32l476rgt
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            ~/.config/nix
          key: nix-${{ runner.os }}-${{ matrix.port }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-${{ matrix.port }}-
            nix-${{ runner.os }}-

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build tests for ${{ matrix.port }}
        run: |
          nix develop --accept-flake-config --command bash -c '
              cd test
              python3 makeAllTests.py --ports ${{ matrix.port }}
          '

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.port }}
          path: build/${{ matrix.port }}/
          retention-days: 5

  # Summary job that waits for all matrix jobs to complete
  build-summary:
    runs-on: ubuntu-latest
    needs: build-tests
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-tests.result }}" != "success" ]; then
            echo "One or more builds failed"
            exit 1
          fi
          echo "All builds completed successfully!"