name: Build Tests

on:
  pull_request:
  push:
    paths-ignore:
      - "**/*.md"
      - "**/*.dbc"
      - "**/*.py"

jobs:
  # The driver/ and bsp/ library layers are committed to STM32G4-only: peripheral
  # init (clock/NVIC/pins) lives in per-MCU board files behind CMSIS instance
  # guards, never behind STM32F4xx/STM32L4xx ifdefs. (Tests stay multi-board on
  # purpose.) Fail fast if an F4/L4 reference creeps back into the library.
  guard-g4-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: driver/ and bsp/ must be STM32G4-only
        run: |
          if grep -rnE 'STM32F4xx|STM32L4xx' driver/ test/bsp/; then
            echo "::error::F4/L4 reference found in driver/ or test/bsp/ -- the library is STM32G4-only. Put device-specific init in a board file (CMSIS instance guards), not behind STM32F4xx/STM32L4xx."
            exit 1
          fi
          echo "OK: driver/ and test/bsp/ are STM32G4-only."

  # Setup job to generate the build matrix dynamically
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate build matrix
        id: generate-matrix
        run: |
          MATRIX=$(python3 .github/generate-build-matrix.py)
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  # Matrix job to run all port+test combinations in parallel
  build-tests:
    runs-on: ubuntu-latest
    needs: setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            ~/.config/nix
          key: nix-${{ runner.os }}-${{ matrix.port }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-${{ matrix.port }}-
            nix-${{ runner.os }}-

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build tests for ${{ matrix.port }}
        run: |
          nix develop --accept-flake-config --command bash -c '
              cd test
              python3 makeAllTests.py --ports ${{ matrix.port }}
          '

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.port }}
          path: build/${{ matrix.port }}/
          retention-days: 5

  # Summary job that waits for all matrix jobs to complete
  build-summary:
    runs-on: ubuntu-latest
    needs: build-tests
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-tests.result }}" != "success" ]; then
            echo "One or more builds failed"
            exit 1
          fi
          echo "All builds completed successfully!"