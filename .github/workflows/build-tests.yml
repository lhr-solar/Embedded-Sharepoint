name: Build Tests

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Cache Nix
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/nix
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Install Nix Action
        uses: cachix/install-nix-action@v31

      - name: Clean & Build tests
        run: |
          nix develop --accept-flake-config --command bash -c "
            git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep -vE '^(docs/|dbc/)' | grep -q . && \
            cd test && make clean && python3 makeAllTests.py
          "
