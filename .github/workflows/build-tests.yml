name: Build Tests

on:
  pull_request:
  push:
    paths-ignore:
      - "**/*.md"
      - "**/*.dbc"
      - "**/*.py"

jobs:
  # Discover available ports dynamically
  discover-ports:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover ports
        id: set-matrix
        run: |
          # Find all linker scripts and extract port names (matching makeAllTests.py logic)
          ports=$(find stm -name "*.ld" -type f | xargs -I {} basename {} | sed 's/_FLASH\.ld//' | sed 's/x//g' | sed 's/_//g' | tr '[:upper:]' '[:lower:]' | sort -u)
          
          # Convert to JSON format for matrix
          matrix=$(echo "$ports" | awk 'BEGIN{printf "["}NF{if(NR>1)printf ","; printf "{\"port\":\"%s\"}", $0}END{printf "]"}')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Discovered ports: $matrix"

  # Matrix job to run all port+test combinations in parallel
  build-tests:
    needs: discover-ports
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-ports.outputs.matrix) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            ~/.config/nix
          key: nix-${{ runner.os }}-${{ matrix.port }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-${{ matrix.port }}-
            nix-${{ runner.os }}-

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build tests for ${{ matrix.port }}
        run: |
          nix develop --accept-flake-config --command bash -c '
              cd test
              python3 makeAllTests.py --ports ${{ matrix.port }}
          '

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.port }}
          path: build/${{ matrix.port }}/
          retention-days: 5

  # Summary job that waits for all matrix jobs to complete
  build-summary:
    runs-on: ubuntu-latest
    needs: build-tests
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-tests.result }}" != "success" ]; then
            echo "One or more builds failed"
            exit 1
          fi
          echo "All builds completed successfully!"
