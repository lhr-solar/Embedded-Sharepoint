name: Run checks on CAN DBCs

on:
  push:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check duplicate CAN IDs
        run: |
          python .github/check_duplicate_can_ids.py can/dbc/Mcqueen
      - name: Check CAN header generation
        run: |
          python .github/validate_dbc_generation.py can/dbc/Mcqueen can/generate_can_headers.py